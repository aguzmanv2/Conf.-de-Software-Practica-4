{% extends "base.html" %}

{% block title %}Bienvenido{% endblock %}

{% block content %}
<div class="card" style="text-align: center;">
    <div style="font-size: 60px; color: #2e7d32; margin-bottom: 20px;">&#10004;</div>
    <h1 style="color: #2e7d32;">Entraste correctamente</h1>
    <p class="welcome-text">Bienvenido al sistema de gestión de usuarios.</p>

    <div style="background-color: #f5f5f5; padding: 20px; border-radius: 8px; text-align: left; max-width: 400px; margin: 20px auto;">
        <p style="margin: 8px 0; color: #333;"><strong style="color: #1a73e8;">Nombre:</strong> {{ user.get_full_name }}</p>
        <p style="margin: 8px 0; color: #333;"><strong style="color: #1a73e8;">Email:</strong> {{ user.email }}</p>
        <p style="margin: 8px 0; color: #333;"><strong style="color: #1a73e8;">Rol:</strong> {{ user.groups.all.0.name|default:"Sin rol" }}</p>
    </div>
</div>
{% endblock %}
