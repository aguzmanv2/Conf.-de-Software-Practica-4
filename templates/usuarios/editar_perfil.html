{% extends "base.html" %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="card">
    <h1>Mi Perfil</h1>

    {% if form.errors %}
        <div class="error">
            {% for field, errors in form.errors.items %}
                {% for error in errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="id_first_name">Nombres</label>
                <input type="text" id="id_first_name" name="first_name" value="{{ form.instance.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="id_last_name">Apellidos</label>
                <input type="text" id="id_last_name" name="last_name" value="{{ form.instance.last_name }}" required>
            </div>
        </div>
        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" id="id_email" name="email" value="{{ form.instance.email }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
    </form>
</div>
{% endblock %}
